<!-- Search & Filter Bar -->
<form method="GET" class="bg-white rounded-xl border border-gray-200 p-4 mb-6">
    <div class="flex flex-wrap items-end gap-4">

        <!-- Search -->
        <div class="flex-1 min-w-[200px]">
            <label class="block text-xs text-gray-500 mb-1">Search</label>
            <input type="text" name="search" value="{{ search }}"
                   placeholder="{{ search_placeholder|default:'Search...' }}"
                   class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-sm">
        </div>

        {% block extra_filters %}{% endblock %}

        <!-- Buttons -->
        <div class="flex gap-2">
            <button type="submit"
                    class="bg-primary hover:bg-primary-dark text-white px-4 py-2 rounded-lg text-sm font-medium transition">
                🔍 Search
            </button>
            <a href="{{ request.path }}"
               class="border border-gray-300 hover:bg-gray-50 text-gray-600 px-4 py-2 rounded-lg text-sm font-medium transition">
                Clear
            </a>
        </div>
    </div>
</form>
